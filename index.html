<body>
  <div id="topbar">
    <h1>Topotrainer</h1>
    <button id="menuToggle">☰</button>
  </div>

  <!-- Mobile dropdown menu -->
  <div id="mobileMenu">
    <h3>Load Files</h3>

    <label class="fileLabel">
      Upload Quiz Questions
      <input type="file" id="quizInput" accept=".txt">
    </label>

    <label class="fileLabel">
      Upload GeoJSON
      <input type="file" id="geojsonInput" accept=".geojson,.json">
    </label>

    <h3>Layers</h3>
    <div id="layerList"></div>
  </div>

  <!-- Quiz card -->
  <div id="quizCard">
    <div id="modeTitle">Quiz</div>
    <div id="modeInstruction">Click the correct location on the map.</div>
    <div id="taskText"></div>

    <div id="progressContainer">
      <div id="progressBar"></div>
    </div>

    <div id="feedback"></div>
    <div id="score"></div>
  </div>

  <!-- Map -->
  <div id="map"></div>
</body>
